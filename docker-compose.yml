services:

  mariadb:
    image: mariadb:10.11
    container_name: nexustalk-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nexustalk
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: nexustalk-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mariadb_data: