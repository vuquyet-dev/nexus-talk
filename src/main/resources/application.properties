spring.application.name=nexus-talk

# Local default matches docker-compose.yml (MariaDB exposed on 3307).
spring.datasource.url=${NEXUSTALK_DB_URL:jdbc:mariadb://localhost:3307/nexustalk}
spring.datasource.username=${NEXUSTALK_DB_USER:root}
spring.datasource.password=${NEXUSTALK_DB_PASSWORD:root}
#spring.datasource.url=jdbc:mariadb://localhost:3306/nexustalk
#spring.datasource.username=root
#spring.datasource.password=root

# DDL source of truth: Flyway migrations in src/main/resources/db/migration
spring.sql.init.mode=never

spring.jpa.hibernate.ddl-auto=update

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration

#open ai
spring.ai.openai.api-key=${OPENAI_KEY}
